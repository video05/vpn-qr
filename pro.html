<html>
<head>

<title>PRO VPN</title>

<meta http-equiv="refresh" content="60">

<style>

body{
font-family:sans-serif;
text-align:center;
}

.qr{
margin:40px;
}

</style>

</head>

<body>

<h1>PRO VPN SERVERS</h1>

<div class="qr">

<h2>VPN 1</h2>

<img src="qr1.png" width="260">

<p id="t1"></p>

</div>

<div class="qr">

<h2>VPN 2</h2>

<img src="qr2.png" width="260">

<p id="t2"></p>

</div>

<div class="qr">

<h2>VPN 3</h2>

<img src="qr3.png" width="260">

<p id="t3"></p>

</div>

<script>

fetch("pro_state.json")
.then(r=>r.json())
.then(data=>{

let now=Math.floor(Date.now()/1000)

data.servers.forEach((s,i)=>{

let alive=now-s.start

let min=Math.floor(alive/60)

let hr=Math.floor(min/60)

document.getElementById("t"+(i+1)).innerText="Alive: "+hr+"h "+(min%60)+"m"

})

})

</script>

</body>
</html>
