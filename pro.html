<html>

<head>

<title>PRO VPN SERVERS</title>

<meta http-equiv="refresh" content="60">

<style>

body{
font-family:sans-serif;
text-align:center;
background:#111;
color:#eee;
}

.qr{
margin:40px;
padding:20px;
border:1px solid #333;
border-radius:10px;
display:inline-block;
width:300px;
}

.info{
margin-top:10px;
font-size:14px;
color:#bbb;
}

.footer{
margin-top:60px;
padding:20px;
border-top:1px solid #333;
font-size:14px;
color:#aaa;
max-width:800px;
margin-left:auto;
margin-right:auto;
}

</style>

</head>

<body>

<h1>PRO VPN SERVERS</h1>

<p>Auto checked every 5 minutes</p>

<div class="qr">

<h2>VPN #1</h2>

<img src="qr1.png" width="220">

<div class="info" id="info1"></div>

</div>


<div class="qr">

<h2>VPN #2</h2>

<img src="qr2.png" width="220">

<div class="info" id="info2"></div>

</div>


<div class="qr">

<h2>VPN #3</h2>

<img src="qr3.png" width="220">

<div class="info" id="info3"></div>

</div>


<script>

fetch("pro_state.json")
.then(r=>r.json())
.then(data=>{

let now=Math.floor(Date.now()/1000)

data.servers.forEach((s,i)=>{

let alive=now-s.start

let min=Math.floor(alive/60)

let hr=Math.floor(min/60)

let aliveText="Alive: "+hr+"h "+(min%60)+"m"

let ping=s.ping?("Ping: "+Math.round(s.ping*1000)+" ms"):"Ping: unknown"

let country=s.country?("Country: "+s.country):"Country: unknown"

let ip=s.ip?("Server: "+s.ip):""

let status="Status: ONLINE"

document.getElementById("info"+(i+1)).innerHTML=

ping+"<br>"+country+"<br>"+ip+"<br>"+aliveText+"<br>"+status

})

})

</script>


<div class="footer">

<h3>Важно</h3>

<p>

</p>

<p>

<p>

</p>

<p>

</p>

</div>
