<html>

<head>

<title>PRO VPN SERVERS</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<meta http-equiv="refresh" content="60">

<style>

body{
font-family:sans-serif;
background:#111;
color:#eee;
text-align:center;
margin:0;
padding:0;
}

.container{
display:flex;
flex-wrap:wrap;
justify-content:center;
}

.qr{
margin:20px;
padding:20px;
border:1px solid #333;
border-radius:10px;
width:280px;
background:#1a1a1a;
}

.info{
font-size:14px;
margin-top:10px;
color:#bbb;
}

button{
margin-top:10px;
padding:10px 14px;
border:none;
background:#2ecc71;
color:white;
border-radius:6px;
cursor:pointer;
font-size:14px;
}

button:hover{
background:#27ae60;
}

.footer{
margin-top:60px;
padding:20px;
border-top:1px solid #333;
color:#aaa;
max-width:800px;
margin-left:auto;
margin-right:auto;
font-size:14px;
}

/* 📱 MOBILE */

@media (max-width: 700px){

.container{
flex-direction:column;
align-items:center;
}

.qr{
width:90%;
max-width:320px;
}

}

</style>

</head>

<body>

<h1>PRO VPN SERVERS</h1>

<p>Servers tested every 5 minutes</p>

<div class="container">

<div class="qr">

<h2>VPN 1</h2>

<img src="qr1.png" width="220">

<div class="info" id="info1"></div>

<button onclick="copyConfig(0)">Copy config</button>

</div>


<div class="qr">

<h2>VPN 2</h2>

<img src="qr2.png" width="220">

<div class="info" id="info2"></div>

<button onclick="copyConfig(1)">Copy config</button>

</div>


<div class="qr">

<h2>VPN 3</h2>

<img src="qr3.png" width="220">

<div class="info" id="info3"></div>

<button onclick="copyConfig(2)">Copy config</button>

</div>

</div>


<script>

let servers=[]

fetch("pro_state.json")
.then(r=>r.json())
.then(data=>{

servers=data.servers

let now=Math.floor(Date.now()/1000)

data.servers.forEach((s,i)=>{

let alive=now-s.start

let min=Math.floor(alive/60)

let hr=Math.floor(min/60)

let text=

"Ping: "+Math.round(s.ping*1000)+" ms<br>"+
"Country: "+s.country+"<br>"+
"Server: "+s.ip+"<br>"+
"Alive: "+hr+"h "+(min%60)+"m<br>"+
"Status: ONLINE"

document.getElementById("info"+(i+1)).innerHTML=text

})

})

function copyConfig(index){

let text=servers[index].config

navigator.clipboard.writeText(text)

alert("Config copied!")

}

</script>


<div class="footer">

<h3>Важно</h3>

<p>
Этот сайт полностью бесплатный.
</p>

<p>
Если кто-то предлагает вам купить доступ к этому сервису — это мошенники.
</p>

<p>
Все VPN конфигурации взяты из открытых источников и публикуются здесь бесплатно.
</p>

<p>
Никому ничего платить не нужно.
</p>

</div>

</body>

</html>
