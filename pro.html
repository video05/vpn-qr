<html>

<head>

<title>PRO VPN SERVERS</title>

<meta name="viewport" content="width=device-width, initial-scale=1">
<meta http-equiv="refresh" content="60">

<style>

body{
font-family:sans-serif;
background:#111;
color:#eee;
text-align:center;
margin:0;
}

.container{
display:flex;
flex-wrap:wrap;
justify-content:center;
}

.qr{
margin:15px;
padding:15px;
border:1px solid #333;
border-radius:10px;
width:260px;
background:#1a1a1a;
}

.info{
font-size:14px;
margin-top:10px;
color:#bbb;
}

button{
margin-top:8px;
padding:10px;
border:none;
border-radius:6px;
cursor:pointer;
font-size:14px;
}

.copy{
background:#2ecc71;
color:white;
}

.flag{
vertical-align:middle;
margin-right:4px;
}

.apps{
margin-top:40px;
display:flex;
justify-content:center;
gap:40px;
flex-wrap:wrap;
}

.app{
text-decoration:none;
color:white;
display:flex;
flex-direction:column;
align-items:center;
font-size:14px;
}

.app img{
width:64px;
height:64px;
margin-bottom:10px;
}

.footer{
margin-top:60px;
padding:20px;
border-top:1px solid #333;
color:#aaa;
max-width:800px;
margin-left:auto;
margin-right:auto;
font-size:14px;
}

</style>

</head>

<body>

<h1>PRO VPN SERVERS</h1>

<p>Servers tested every 5 minutes</p>

<p id="updateTime">Last update: loading...</p>

<div class="container" id="vpnContainer"></div>

<script>

let servers=[]

fetch("pro_state.json")
.then(r=>r.json())
.then(data=>{

servers=data.servers||[]

let updated=data.updated||0

if(updated){

let moscowTime=new Date((updated+3*3600)*1000)

let h=moscowTime.getUTCHours().toString().padStart(2,'0')
let m=moscowTime.getUTCMinutes().toString().padStart(2,'0')

document.getElementById("updateTime").innerHTML=
"Last update (MSK): "+h+":"+m

}

let now=Math.floor(Date.now()/1000)

let container=document.getElementById("vpnContainer")

servers.forEach((s,i)=>{

let ping=s.ping?Math.round(s.ping*1000)+" ms":"N/A"

let country=s.country||"Unknown"

let ip=s.ip||"Unknown"

let flag=""

if(s.flag){
flag=`<img class="flag" src="https://flagcdn.com/24x18/${s.flag}.png">`
}

let alive=now-(s.start||now)

let min=Math.floor(alive/60)

let hr=Math.floor(min/60)

let text=
"Ping: "+ping+"<br>"+
"Country: "+flag+" "+country+"<br>"+
"Server: "+ip+"<br>"+
"Alive: "+hr+"h "+(min%60)+"m<br>"+
"Status: ONLINE"

let div=document.createElement("div")

div.className="qr"

div.innerHTML=
"<h2>VPN "+(i+1)+"</h2>"+
"<img src='qr"+(i+1)+".png' width='200'>"+
"<div class='info'>"+text+"</div>"+
"<button class='copy' onclick='copyConfig("+i+")'>Copy config</button>"

container.appendChild(div)

})

})

function copyConfig(index){

if(!servers[index]) return

navigator.clipboard.writeText(servers[index].config)

alert("Config copied")

}

</script>

<div class="apps">

<a class="app" href="https://play.google.com/store/apps/details?id=com.v2raytun.android&hl=ru" target="_blank">
<img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/android/android-original.svg">

</div>

</div>

</body>

</html>
